    <!-- Modal -->
    <div class="modal" tabindex="-1" role="dialog" id="UserModal">
    <div class="modal-dialog" role="document">
        <div class="modal-content">
        <div class="modal-header">
            <h5 class="modal-title" id="ModalTitulo">User</h5>
            <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
            </button>
        </div>
            <div class="modal-body">
                <form id="UserForms">
                    <input type="hidden" id="userID">
                    <div class="mb-3">
                        <label for="ModalInputNome">Nome</label>
                        <input type="text" class="form-control" id="ModalInputNome"  placeholder="Enter email">
                    </div>
                    <div class="mb-3">
                        <label for="ModalInputEmail">Email</label>
                        <input type="email" class="form-control" id="ModalInputEmail" placeholder="Enter email">
                    </div>
                    <div class="mb-3">
                        <label for="ModalInputSenha">Senha</label>

                    </div>
                    <div class="mb-3">
                        <label for="ModalInputTelefone">Telefone</label>

                    </div>
                    <button type="submit" class="btn btn-primary">Salva</button>
